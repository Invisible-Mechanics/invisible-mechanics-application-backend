<!doctype html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px; color: #0b0b0e;">
    <h1 style="font-size: 22px; margin: 0 0 12px;">Sign in to Invisible Mechanics</h1>
    <p style="font-size: 14px; color: #444; margin: 0 0 20px;">
      Click the button below to sign in. The link works for {expires_min} minutes.
    </p>
    <p>
      <a href="{magic_link}" style="display: inline-block; background: #0b0b0e; color: #fafafa; text-decoration: none; padding: 12px 20px; border-radius: 6px; font-size: 14px;">Sign in</a>
    </p>
    <p style="font-size: 14px; color: #444; margin: 24px 0 8px;">
      Or enter this code on the login page:
    </p>
    <p style="font-size: 28px; letter-spacing: 6px; font-weight: 600; margin: 0 0 24px; font-family: ui-monospace, 'SF Mono', Menlo, monospace;">{code}</p>
    <p style="font-size: 12px; color: #777; margin-top: 32px;">
      If you didn't request this, you can safely ignore this email.
    </p>
    <p style="font-size: 12px; color: #777;">— Invisible Mechanics</p>
  </body>
</html>
